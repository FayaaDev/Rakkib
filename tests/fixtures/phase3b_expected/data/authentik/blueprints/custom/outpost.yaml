version: 1
metadata:
  name: Rakkib - Embedded Outpost Providers
entries:
  - model: authentik_outposts.outpost
    state: present
    identifiers:
      name: "authentik Embedded Outpost"
    attrs:
      config:
        authentik_host: "https://auth.example.com/"
        authentik_host_browser: "https://auth.example.com/"
      providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-dockge]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-homepage]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-immich]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-jellyfin]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-n8n]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-uptime-kuma]]
