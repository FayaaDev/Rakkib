services:
  - id: caddy
    state_bucket: always
    required: true
    image: caddy:2
    default_port: 80
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys: []
    depends_on: []
    host_service: false
    notes: "Reverse proxy. Always installed."

  - id: cloudflared
    state_bucket: always
    required: true
    image: cloudflare/cloudflared:latest
    default_port: null
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys: []
    depends_on: []
    host_service: false
    notes: "Cloudflare tunnel. Always installed. Step 40 may pause for guided Cloudflare login approval."

  - id: postgres
    state_bucket: always
    required: true
    image: pgvector/pgvector:pg16
    default_port: 5432
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys:
      - POSTGRES_PASSWORD
    depends_on: []
    host_service: false
    notes: "Single postgres instance serves all services. Port bound to 127.0.0.1 only."

  # --- Foundation Bundle (recommended, presented as a pre-checked group) ---

  - id: nocodb
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: nocodb/nocodb:latest
    default_port: 8080
    default_subdomain: nocodb
    subdomain_key: nocodb
    subdomain_placeholder: NOCODB_SUBDOMAIN
    env_keys:
      - NOCODB_DB_PASS
      - ADMIN_EMAIL
      - NOCODB_ADMIN_PASS
      - NOCODB_OIDC_CLIENT_ID
      - NOCODB_OIDC_CLIENT_SECRET
    depends_on: [postgres]
    host_service: false
    notes: "No-code database UI. Foundation bundle service. Supports OIDC via Authentik when auth is selected."

  - id: authentik
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: ghcr.io/goauthentik/server:latest
    default_port: 9000
    default_subdomain: auth
    subdomain_key: authentik
    subdomain_placeholder: AUTHENTIK_SUBDOMAIN
    env_keys:
      - AUTHENTIK_SECRET_KEY
      - AUTHENTIK_DB_PASS
      - AUTHENTIK_ADMIN_PASS
    depends_on: [postgres]
    host_service: false
    notes: "SSO / auth proxy. Foundation bundle service. Deploys server + worker + redis containers. Applies blueprints for selected downstream services on first start."

  - id: homepage
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: ghcr.io/gethomepage/homepage:latest
    default_port: 3000
    default_subdomain: home
    subdomain_key: homepage
    subdomain_placeholder: HOMEPAGE_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    notes: "Service dashboard. Foundation bundle service. services.yaml generated from selected service list."

  - id: uptime-kuma
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: louislam/uptime-kuma:latest
    default_port: 3001
    default_subdomain: status
    subdomain_key: uptime-kuma
    subdomain_placeholder: UPTIME_KUMA_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    notes: "Uptime monitoring. Foundation bundle service."

  - id: dockge
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: louislam/dockge:latest
    default_port: 5001
    default_subdomain: dockge
    subdomain_key: dockge
    subdomain_placeholder: DOCKGE_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    notes: "Docker Compose manager UI. Foundation bundle service. Mounts the stacks directory."

  # --- Optional Services (Tier 1) ---

  - id: n8n
    state_bucket: selected_services
    required: false
    optional: true
    image: n8nio/n8n:latest
    default_port: 5678
    default_subdomain: n8n
    subdomain_key: n8n
    subdomain_placeholder: N8N_SUBDOMAIN
    env_keys:
      - N8N_DB_PASS
      - N8N_ENCRYPTION_KEY
    depends_on: [postgres]
    host_service: false
    notes: "Workflow automation. NEVER rotate N8N_ENCRYPTION_KEY after first run. Uses the upstream n8nio/n8n image."

  - id: dbhub
    state_bucket: selected_services
    required: false
    optional: true
    image: bytebase/dbhub:latest
    default_port: 8080
    default_subdomain: dbhub
    subdomain_key: dbhub
    subdomain_placeholder: DBHUB_SUBDOMAIN
    env_keys: []
    depends_on: [postgres]
    host_service: false
    notes: "Database browser. Optional. Uses dbhub.toml config file."

  - id: immich
    state_bucket: selected_services
    required: false
    optional: true
    image: ghcr.io/immich-app/immich-server:release
    default_port: 2283
    default_subdomain: immich
    subdomain_key: immich
    subdomain_placeholder: IMMICH_SUBDOMAIN
    env_keys:
      - IMMICH_DB_PASSWORD
      - IMMICH_VERSION
    depends_on: []
    host_service: false
    notes: "Photo and video library. Optional. CPU-only v1 install using Immich's dedicated Postgres and Valkey services."

  - id: transfer
    state_bucket: selected_services
    required: false
    optional: true
    image: dutchcoders/transfer.sh:latest-noroot
    default_port: 8080
    default_subdomain: transfer
    subdomain_key: transfer
    subdomain_placeholder: TRANSFER_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    notes: "Self-hosted transfer.sh file sharing. Optional. Public unauthenticated upload endpoint by design; use only when the owner accepts the abuse risk. Stores uploads on the local filesystem."

  - id: openclaw
    state_bucket: selected_services
    required: false
    optional: true
    image: null
    default_port: 18789
    default_subdomain: claw
    subdomain_key: openclaw
    subdomain_placeholder: OPENCLAW_SUBDOMAIN
    env_keys:
      - CLAW_GATEWAY_PORT
    depends_on: []
    host_service: true
    notes: "AI gateway. Install from npm with node >= 22.14.0 into ~/.local/bin/openclaw, then run as a systemd user unit (Linux) or launchd plist (Mac)."

  - id: hermes
    state_bucket: selected_services
    required: false
    optional: true
    image: null
    default_port: 9119
    default_subdomain: hermes
    subdomain_key: hermes
    subdomain_placeholder: HERMES_SUBDOMAIN
    env_keys:
      - HERMES_DASHBOARD_PORT
    depends_on: [authentik]
    host_service: true
    notes: "NousResearch Hermes Agent dashboard. Install from the official installer into ~/.local/bin/hermes, then run the dashboard as a systemd user unit (Linux) or launchd plist (Mac) behind Authentik."

  - id: jellyfin
    state_bucket: selected_services
    required: false
    optional: true
    image: jellyfin/jellyfin:latest
    default_port: 8096
    default_subdomain: jellyfin
    subdomain_key: jellyfin
    subdomain_placeholder: JELLYFIN_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    notes: "Media server. Optional. Self-hosted streaming for movies, TV, music, and photos."
